name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore StackPilot.sln
      - name: Build
        run: dotnet build StackPilot.sln --no-restore -c Release
      - name: Test
        run: dotnet test tests/StackPilot.IntegrationTests/StackPilot.IntegrationTests.csproj --no-build -c Release --verbosity normal
      - name: Build Workers
        run: dotnet build src/StackPilot.Workers/StackPilot.Workers.csproj -c Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
