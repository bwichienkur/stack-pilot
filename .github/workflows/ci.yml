name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stackpilot_test
          POSTGRES_USER: stackpilot
          POSTGRES_PASSWORD: stackpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore StackPilot.sln
      - name: Build
        run: dotnet build StackPilot.sln --no-restore -c Release
      - name: Test
        run: dotnet test tests/StackPilot.IntegrationTests/StackPilot.IntegrationTests.csproj --no-build -c Release --verbosity normal
        env:
          POSTGRES_TEST_CONNECTION: Host=localhost;Port=5432;Database=stackpilot_test;Username=stackpilot;Password=stackpilot
      - name: Build Workers
        run: dotnet build src/StackPilot.Workers/StackPilot.Workers.csproj -c Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stackpilot
          POSTGRES_USER: stackpilot
          POSTGRES_PASSWORD: stackpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore & build API
        run: dotnet build src/StackPilot.Api/StackPilot.Api.csproj -c Release

      - name: Start API
        run: |
          dotnet run --project src/StackPilot.Api/StackPilot.Api.csproj -c Release --no-launch-profile &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && break
            sleep 2
          done
        env:
          ASPNETCORE_URLS: http://0.0.0.0:5000
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=stackpilot;Username=stackpilot;Password=stackpilot
          ConnectionStrings__Redis: ""
          ASPNETCORE_ENVIRONMENT: Development
          DEMO_SEED: "true"

      - name: Install frontend & Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev &
          for i in $(seq 1 45); do
            curl -sf http://localhost:3000/login | grep -q "Welcome to StackPilot" && break
            sleep 2
          done
          curl -sf http://localhost:3000/login | grep -q "Welcome to StackPilot"
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1

      - name: Run Playwright golden path
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
          DEMO_SEED: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:5000/api/v1
