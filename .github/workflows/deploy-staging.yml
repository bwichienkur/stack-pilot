name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "frontend/**"
      - "Dockerfile.*"
      - "docker-compose.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/stackpilot

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api -t ${{ env.IMAGE_PREFIX }}-api:staging -t ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-api:staging
          docker push ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build and push Workers image
        run: |
          docker build -f Dockerfile.workers -t ${{ env.IMAGE_PREFIX }}-workers:staging -t ${{ env.IMAGE_PREFIX }}-workers:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-workers:staging
          docker push ${{ env.IMAGE_PREFIX }}-workers:${{ github.sha }}

      - name: Build and push Frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.STAGING_API_URL || 'https://api.staging.stackpilot.dev/api/v1' }} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:staging \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-frontend:staging
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      - name: Staging deploy summary
        run: |
          echo "## Staging images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-api:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-workers:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-frontend:staging\`" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-images
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stackpilot
          POSTGRES_USER: stackpilot
          POSTGRES_PASSWORD: stackpilot
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/StackPilot.IntegrationTests/StackPilot.IntegrationTests.csproj -c Release --verbosity normal
        env:
          POSTGRES_TEST_CONNECTION: Host=localhost;Port=5432;Database=stackpilot;Username=stackpilot;Password=stackpilot

  staging-e2e:
    runs-on: ubuntu-latest
    needs: build-images
    if: vars.STAGING_FRONTEND_URL != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Run Playwright against staging
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_FRONTEND_URL }}
          PLAYWRIGHT_API_URL: ${{ vars.STAGING_API_URL }}
