name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "frontend/**"
      - "Dockerfile.*"
      - "docker-compose.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/stackpilot
  # Defaults let the workflow run even when repo variables aren't configured yet.
  # Override in GitHub Settings → Actions → Variables when needed.
  STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL || 'https://staging.stackpilot.dev' }}
  STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://api.staging.stackpilot.dev/api/v1' }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api -t ${{ env.IMAGE_PREFIX }}-api:staging -t ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-api:staging
          docker push ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build and push Workers image
        run: |
          docker build -f Dockerfile.workers -t ${{ env.IMAGE_PREFIX }}-workers:staging -t ${{ env.IMAGE_PREFIX }}-workers:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-workers:staging
          docker push ${{ env.IMAGE_PREFIX }}-workers:${{ github.sha }}

      - name: Build and push Frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.STAGING_API_URL }} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:staging \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-frontend:staging
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      - name: Staging deploy summary
        run: |
          echo "## Staging images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-api:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-workers:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-frontend:staging\`" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-images
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stackpilot
          POSTGRES_USER: stackpilot
          POSTGRES_PASSWORD: stackpilot
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/StackPilot.IntegrationTests/StackPilot.IntegrationTests.csproj -c Release --verbosity normal
        env:
          POSTGRES_TEST_CONNECTION: Host=localhost;Port=5432;Database=stackpilot;Username=stackpilot;Password=stackpilot

  staging-e2e:
    runs-on: ubuntu-latest
    needs: build-images
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stackpilot
          POSTGRES_USER: stackpilot
          POSTGRES_PASSWORD: stackpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stackpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      
      - name: Restore & build API
        run: dotnet build src/StackPilot.Api/StackPilot.Api.csproj -c Release

      - name: Start API
        run: |
          dotnet run --project src/StackPilot.Api/StackPilot.Api.csproj -c Release --no-launch-profile &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && break
            sleep 2
          done
        env:
          ASPNETCORE_URLS: http://0.0.0.0:5000
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=stackpilot;Username=stackpilot;Password=stackpilot
          ConnectionStrings__Redis: ""
          ASPNETCORE_ENVIRONMENT: Development
          DEMO_SEED: "true"

      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev &
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3000/login | python -c "import sys; sys.exit(0 if 'Welcome to StackPilot' in sys.stdin.read() else 1)"; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/login | python -c "import sys; sys.exit(0 if 'Welcome to StackPilot' in sys.stdin.read() else 1)"
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1

      - name: Run Playwright golden path (local stack)
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
          DEMO_SEED: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:5000/api/v1
